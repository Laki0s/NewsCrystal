name: "✨ Feature request"
description: "Propose a new feature or an improvement"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / need
      description: What problem does this feature solve?
      placeholder: "As a reader, I want to be able to filter by tag so that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the desired feature.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Scraper
        - Storage / SQLite
        - Scheduler
        - REST API
        - Web interface
        - RSS/Atom feed
        - Deployment / Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered (optional).

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, example sources, etc.
