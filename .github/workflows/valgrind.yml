name: Valgrind

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch: {}

jobs:
  memcheck:
    name: Memory check (Valgrind)
    runs-on: self-hosted
    container: crystallang/crystal:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Valgrind, SQLite)
        run: apt-get update && apt-get install -y valgrind libsqlite3-dev

      - name: Check Valgrind is available
        run: valgrind --version

      - name: Install dependencies
        run: shards install --frozen

      # Crystal note: the Boehm GC allocates memory that Valgrind reports as
      # "leaks" or "still reachable". The suppression file
      # .github/valgrind/crystal.supp filters out this noise.
      - name: Run specs under Valgrind
        env:
          # Helps Boehm cooperate with Valgrind
          GC_MARKERS: "1"
        run: |
          valgrind \
            --tool=memcheck \
            --leak-check=full \
            --show-leak-kinds=definite \
            --errors-for-leak-kinds=definite \
            --suppressions=.github/valgrind/crystal.supp \
            --error-exitcode=1 \
            --gen-suppressions=all \
            crystal spec --no-color
