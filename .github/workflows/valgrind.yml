name: Valgrind

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch: {}

# Valgrind does not exist on macOS (Apple Silicon), so the memory check runs
# inside a Linux container launched via `docker run` from a step. A job-level
# `container:` is not allowed on macOS runners, but the Docker CLI is.
jobs:
  memcheck:
    name: Memory check (Valgrind)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # The workspace is mounted read-only and copied to /build inside the
      # container, so nothing (root-owned lib/, bin/) is written back to the
      # host runner. The Boehm GC noise is filtered by the suppressions file.
      - name: Run specs under Valgrind (Linux container)
        run: |
          docker run --rm \
            -v "$PWD:/src:ro" \
            -e GC_MARKERS=1 \
            --entrypoint bash \
            84codes/crystal:latest \
            -c '
              set -e
              cp -r /src /build && cd /build
              apt-get update && apt-get install -y --no-install-recommends valgrind libsqlite3-dev
              shards install --frozen
              valgrind \
                --tool=memcheck \
                --leak-check=full \
                --show-leak-kinds=definite \
                --errors-for-leak-kinds=definite \
                --suppressions=.github/valgrind/crystal.supp \
                --error-exitcode=1 \
                --gen-suppressions=all \
                crystal spec --no-color
            '
